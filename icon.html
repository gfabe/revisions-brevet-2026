<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:180px;height:180px;overflow:hidden;}
  .icon{ width:180px;height:180px;border-radius:40px;position:relative;overflow:hidden; background:linear-gradient(150deg,#0f172a,#3b1d6b);}
  .icon img{ position:absolute; top:0; left:50%; transform:translateX(-50%); width:200px; height:180px; object-fit:cover; object-position:50% 14%;}
  .grad{ position:absolute; inset:0; background:linear-gradient(180deg,rgba(15,23,42,0) 38%,rgba(15,23,42,.85) 76%,rgba(15,23,42,.97) 100%);}
  .ring{ position:absolute; inset:0; border-radius:40px; box-shadow:inset 0 0 0 3px rgba(245,158,11,.85);}
  .lbl{ position:absolute; left:0; right:0; bottom:13px; text-align:center; font-family:-apple-system,Arial,sans-serif;
    font-weight:800; color:#fff; letter-spacing:1.5px; font-size:21px; text-shadow:0 2px 6px rgba(0,0,0,.6);}
  .lbl small{ display:block; font-size:9.5px; letter-spacing:2.5px; color:#fcd34d; font-weight:700; margin-top:1px;}
</style></head>
<body>
  <div class="icon">
    <img src="airhead-portrait.jpg" alt="">
    <div class="grad"></div><div class="ring"></div>
    <div class="lbl">RÉVISIONS<small>BREVET 2026</small></div>
  </div>
</body></html>
